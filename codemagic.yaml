workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Instalar dependencias con Yarn
        script: |
          # Detectar automáticamente la carpeta que contiene el proyecto
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Proyecto detectado en la ruta: $REPO_DIR"
          cd "$REPO_DIR"
          
          # Ejecutar instalación limpia
          corepack enable
          yarn install --no-immutable
          
      - name: Generar carpetas nativas (Expo Prebuild)
        script: |
          # Detectar ruta e ingresar
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$REPO_DIR"
          
          npx expo prebuild --platform android
          
      - name: Compilar APK de producción (Release)
        script: |
          # Detectar ruta e ingresar
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$REPO_DIR"
          
          # Compilar de forma nativa
          cd android
          ./gradlew assembleRelease
          
    artifacts:
      # Buscamos el APK usando un patrón universal (**/) para que lo encuentre en cualquier subcarpeta
      - "**/android/app/build/outputs/apk/release/*.apk"
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com # <- Cambia esto por tu correo para recibir el aviso
        notify:
          success: true
          failure: true