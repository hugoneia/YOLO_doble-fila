workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Configurar Entorno y Compilar APK
        script: |
          # 1. Crear el script fantasma de MANUS para evitar fallos en app.config.ts
          echo "🔧 Creando scripts de entorno faltantes..."
          mkdir -p scripts
          echo "// Archivo temporal para bypass de compilación" > scripts/load-env.js
          
          # 2. Configurar Yarn 4 para usar el modo tradicional node_modules
          echo "🔒 Configurando entorno de Yarn 4..."
          corepack enable
          yarn config set nodeLinker node-modules
          touch yarn.lock
          
          # 3. Instalar las dependencias base del proyecto
          echo "📦 Instalando dependencias del proyecto..."
          yarn install --no-immutable
          
          # 3b. PARCHE QUIRÚRGICO: Modificación de NitroModulesPackage.kt
          echo "🩹 Aplicando parche de Nitro..."
          cat << 'EOF' > patch-nitro.js
          const fs = require('fs');
          const files = ['node_modules/react-native-nitro-modules/android/src/main/kotlin/com/margelo/nitro/NitroModulesPackage.kt'];
          files.forEach(filePath => {
            if (fs.existsSync(filePath)) {
              const content = fs.readFileSync(filePath, 'utf8');
              const patched = content.replace(/ReactModuleInfo\s*\([\s\S]*?\)/g, `ReactModuleInfo("NitroModules", "com.margelo.nitro.NitroModulesPackage", false, false, false, true)`);
              fs.writeFileSync(filePath, patched, 'utf8');
            }
          });
          EOF
          node patch-nitro.js
          
          # 4. Forzar instalación de dependencias de React Compiler
          echo "⚛️ Instalando dependencias de React Compiler..."
          yarn add -D babel-plugin-react-compiler
          yarn add react-compiler-runtime
          
          # 5. Asegurar recursos visuales
          echo "🖼️ Asegurando recursos visuales..."
          node -e "
          const fs = require('fs');
          ['assets/images', 'assets'].forEach(p => fs.mkdirSync(p, { recursive: true }));
          const dummy = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');
          ['android-icon-foreground.png', 'android-icon-background.png', 'android-icon-monochrome.png', 'splash-icon.png', 'adaptive-icon.png', 'icon.png'].forEach(f => fs.writeFileSync('assets/'+f, dummy));
          "
          
          # 6. Generar estructura nativa
          echo "🏗️ Generando carpeta nativa de Android..."
          yarn run expo prebuild --platform android
          
          # 6b. Configuración de SDK (SIN FORZAR KOTLIN 2.1.20)
          echo "🛠️ Configurando versiones de SDK..."
          echo "android.compileSdkVersion=35" >> android/gradle.properties
          echo "android.targetSdkVersion=35" >> android/gradle.properties
          echo "android.buildToolsVersion=35.0.0" >> android/gradle.properties
          
          # 7. Compilar el APK definitivo
          echo "🤖 Limpiando y Compilando APK con Gradle..."
          cd android
          ./gradlew clean assembleRelease
          
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true