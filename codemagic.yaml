workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Configurar Entorno y Compilar APK
        script: |
          mkdir -p scripts
          echo "// Bypass" > scripts/load-env.js
          corepack enable
          yarn config set nodeLinker node-modules
          touch yarn.lock
          yarn install --no-immutable
          
          # Parche de Nitro
          cat << 'EOF' > patch-nitro.js
          const fs = require('fs');
          const p = 'node_modules/react-native-nitro-modules/android/src/main/kotlin/com/margelo/nitro/NitroModulesPackage.kt';
          if (fs.existsSync(p)) {
            const content = fs.readFileSync(p, 'utf8');
            fs.writeFileSync(p, content.replace(/ReactModuleInfo\s*\([\s\S]*?\)/g, `ReactModuleInfo("NitroModules", "com.margelo.nitro.NitroModulesPackage", false, false, false, true)`), 'utf8');
          }
          EOF
          node patch-nitro.js
          
          yarn run expo prebuild --platform android
          
          # Configuración de SDK y Desactivación de validaciones estrictas
          echo "android.compileSdkVersion=35" >> android/gradle.properties
          echo "android.targetSdkVersion=35" >> android/gradle.properties
          
          # Inyectar repositorio de Google y deshabilitar checkAarMetadata
          # Esto permite que use las versiones que ya tiene (aunque sean alpha) sin abortar el build
          echo "
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          subprojects {
              tasks.configureEach { task ->
                  if (task.name.toLowerCase().contains('aarmetadata')) {
                      task.enabled = false
                  }
              }
          }" >> android/build.gradle
          
          cd android
          ./gradlew clean assembleRelease
          
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true