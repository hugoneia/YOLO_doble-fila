workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Instalar pnpm
        script: npm install -g pnpm --force # <- Añadido --force para saltar el error
      - name: Instalar dependencias
        script: pnpm install
      - name: Generar carpetas nativas (Expo Prebuild)
        script: npx expo prebuild --platform android
      - name: Compilar APK de producción (Release)
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - mrpulu.party@gmail.com # <- Recuerda cambiar esto por tu correo
        notify:
          success: true
          failure: true