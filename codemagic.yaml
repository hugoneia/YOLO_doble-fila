workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Configurar Entorno y Compilar APK
        script: |
          # 1. Crear el script fantasma de MANUS para evitar fallos en app.config.ts
          echo "🔧 Creando scripts de entorno faltantes..."
          mkdir -p scripts
          echo "// Archivo temporal para bypass de compilación" > scripts/load-env.js
          
          # 2. Configurar Yarn 4 para usar el modo tradicional node_modules
          echo "🔒 Configurando entorno de Yarn 4..."
          corepack enable
          yarn config set nodeLinker node-modules
          touch yarn.lock
          
          # 3. Instalar las dependencias base del proyecto
          echo "📦 Instalando dependencias del proyecto..."
          yarn install --no-immutable
          
          # 3b. PARCHE QUIRÚRGICO 1: Modificación directa de NitroModulesPackage.kt
          echo "🩹 Iniciando parche quirúrgico en NitroModulesPackage.kt..."
          cat << 'EOF' > patch-nitro.js
          const fs = require('fs');
          const path = require('path');

          function findFile(dir, fileName) {
            let results = [];
            if (!fs.existsSync(dir)) return results;
            const list = fs.readdirSync(dir);
            for (const file of list) {
              const filePath = path.join(dir, file);
              const stat = fs.statSync(filePath);
              if (stat.isDirectory()) {
                if (file !== 'build' && file !== '.gradle' && file !== '.git' && file !== '.cache') {
                  results = results.concat(findFile(filePath, fileName));
                }
              } else if (file === fileName) {
                results.push(filePath);
              }
            }
            return results;
          }

          console.log('🔍 Buscando NitroModulesPackage.kt en node_modules...');
          const files = findFile('node_modules', 'NitroModulesPackage.kt');

          if (files.length === 0) {
            console.log('❌ Error crítico: No se encontró NitroModulesPackage.kt.');
            process.exit(1);
          }

          files.forEach(filePath => {
            console.log(`\n✅ Archivo encontrado en: ${filePath}`);
            const originalContent = fs.readFileSync(filePath, 'utf8');
            const patchedContent = originalContent.replace(/ReactModuleInfo\s*\([\s\S]*?\)/g, `ReactModuleInfo(
                "NitroModules",
                "com.margelo.nitro.NitroModulesPackage",
                false,
                false,
                false,
                true
            )`);
            fs.writeFileSync(filePath, patchedContent, 'utf8');
            console.log('🎉 Parche de Nitro aplicado.');
          });
          EOF
          node patch-nitro.js
          
          # 4. Forzar instalación de dependencias de React Compiler
          echo "⚛️ Forzando instalación de dependencias de React Compiler..."
          yarn add -D babel-plugin-react-compiler
          yarn add react-compiler-runtime
          
          # 5. Asegurar recursos visuales
          echo "🖼️ Asegurando recursos visuales mínimos para el Prebuild..."
          node -e "
          const fs = require('fs');
          ['assets/images', 'assets'].forEach(p => fs.mkdirSync(p, { recursive: true }));
          const dummyPng = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');
          ['android-icon-foreground.png', 'android-icon-background.png', 'android-icon-monochrome.png', 'splash-icon.png', 'adaptive-icon.png', 'icon.png'].forEach(f => fs.writeFileSync('assets/'+f, dummyPng));
          "
          
          # 6. Generar estructura nativa
          echo "🏗️ Generando carpeta nativa de Android..."
          yarn run expo prebuild --platform android
          
          # 6b. PARCHE QUIRÚRGICO 2: Configuración de Kotlin y flags de supresión
          echo "🛠️ Parcheando build.gradle y gradle.properties..."
          
          # Añadir flags de supresión a gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dkotlin.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          echo "kotlin.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          echo "org.jetbrains.kotlin.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          echo "kotlinVersion=2.1.20" >> android/gradle.properties

          # Inyectar configuraciones en build.gradle
          echo "ext { compileSdkVersion = 35; targetSdkVersion = 35; buildToolsVersion = '35.0.0' }" >> android/build.gradle
          
          echo "subprojects {
              tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                  kotlinOptions {
                      freeCompilerArgs += ['-P', 'plugin:org.jetbrains.kotlin.compiler.plugins.kotlinx-serialization:suppressKotlinVersionCompatibilityCheck=true']
                  }
              }
              tasks.configureEach { task ->
                  if (task.name.toLowerCase().contains('aarmetadata')) { task.enabled = false }
              }
          }" >> android/build.gradle
          
          # 7. Compilar el APK definitivo
          echo "🤖 Limpiando y Compilando APK con Gradle..."
          cd android
          ./gradlew clean assembleRelease
          
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true