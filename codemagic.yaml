workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Instalar pnpm
        script: npm install -g pnpm --force
      - name: Instalar dependencias
        script: |
          # Borramos la restricción de Yarn del package.json usando Node
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); delete pkg.packageManager; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          # Ahora pnpm instalará todo sin protestar
          pnpm install
      - name: Generar carpetas nativas (Expo Prebuild)
        script: npx expo prebuild --platform android
      - name: Compilar APK de producción (Release)
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - mrpulu.party@gmail.com # <- Cambia esto por tu correo
        notify:
          success: true
          failure: true