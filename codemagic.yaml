workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Configurar Entorno y Compilar APK
        script: |
          # 1. Crear el script fantasma de MANUS para que 'app.config.ts' no falle
          echo "🔧 Creando scripts de entorno faltantes..."
          mkdir -p scripts
          echo "// Archivo temporal para bypass de compilación" > scripts/load-env.js
          
          # 2. Instalar las dependencias con Yarn 4
          echo "📦 Instalando dependencias del proyecto..."
          corepack enable
          yarn install --no-immutable
          
          # 3. Generar la estructura nativa de Android
          echo "🏗️ Generando carpeta nativa de Android (Expo Prebuild)..."
          yarn run expo prebuild --platform android
          
          # 4. Compilar el APK definitivo
          echo "🤖 Compilando APK con Gradle..."
          cd android
          ./gradlew assembleRelease
          
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com # <- Cambia esto por tu correo real
        notify:
          success: true
          failure: true