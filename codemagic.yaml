workflows:
  android-apk-build:
    name: Traffic Monitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Instalar dependencias con Yarn
        script: |
          # Detectar automáticamente la carpeta que contiene el proyecto
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Proyecto detectado en la ruta: $REPO_DIR"
          cd "$REPO_DIR"
          
          # Ejecutar instalación limpia
          corepack enable
          yarn install --no-immutable
          
      - name: Generar carpetas nativas (Expo Prebuild)
        script: |
          # Detectar ruta e ingresar
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$REPO_DIR"
          
          # TRUCO: Inyectamos el script "expo" dinámicamente en el package.json para engañar a Yarn 4
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.scripts = pkg.scripts || {}; pkg.scripts.expo = 'expo'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # Ahora Yarn 4 aceptará el comando sin quejarse
          corepack enable
          yarn run expo prebuild --platform android
          
      - name: Compilar APK de producción (Release)
        script: |
          # Detectar ruta e ingresar
          REPO_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$REPO_DIR"
          
          # Compilar de forma nativa ingresando a la carpeta android generada
          cd android
          ./gradlew assembleRelease
          
    artifacts:
      - "**/android/app/build/outputs/apk/release/*.apk"
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com # <- Cambia esto por tu correo para recibir el APK
        notify:
          success: true
          failure: true